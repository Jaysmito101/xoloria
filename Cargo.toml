[workspace]
resolver = "3"
members = [
    "crates/emulator",
    "crates/firmware",
    "crates/cli",
    "crates/xtask",
]

[workspace.dependencies]
anyhow = { version = "1.0.102", default-features = false }
clap = { version = "4.6.1", features = ["derive"] }
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = "0.3.23"
buddy_system_allocator = "0.13.0"

emulator = { path = "crates/emulator" }